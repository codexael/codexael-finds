        chevron left x = 248*1.867 - 227.6 = 463.0 - 227.6 = 235.4
        chevron tip x  = 280*1.867 - 227.6 = 522.8 - 227.6 = 295.2
        chevron top y  = 312*1.867 - 294.7 = 582.5 - 294.7 = 287.8
        chevron mid y  = 340*1.867 - 294.7 = 634.9 - 294.7 = 340.2  ✓ centered
        chevron bot y  = 368*1.867 - 294.7 = 687.1 - 294.7 = 392.4

