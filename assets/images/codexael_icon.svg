        line1 x=332.5, y=376*1.867-294.7=407.0, w=90*1.867=168.0, h=14*1.867=26.1
        line2 x=332.5, y=398*1.867-294.7=448.1, w=60*1.867=112.0, h=14*1.867=26.1

      Content total width  = 295.2 + (332.5-295.2) + 261.4 = 332.5+261.4-235.4 = 358.5
      Content center x     = 235.4 + 358.5/2 = 235.4+179.25 = 414.65
      Shift to center at 340: dx = 340 - 414.65 = -74.65

      Content top y  = 287.8
      Content bot y  = 448.1+26.1 = 474.2
      Content height = 474.2-287.8 = 186.4
      Content center y = 287.8+186.4/2 = 287.8+93.2 = 381.0
      Shift to center at 340: dy = 340 - 381.0 = -41.0
    -->

