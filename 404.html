<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found — Codexael Finds">
    <meta name="author" content="Codexael">
    <meta name="theme-color" content="#0a0a0a">
    <title>404 — Page Not Found | Codexael Finds</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/codexael_icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="page-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body data-page="404">

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="grid-overlay"></div>
    <div class="noise"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="page-wrap">
        <main class="not-found-wrap">

            <div class="nf-code-line">
                <span class="nf-err-tag">ERROR</span>
                <span class="nf-err-num">404</span>
            </div>

            <h1 class="nf-headline">
                Nothing<br><span class="nf-accent">Here.</span>
            </h1>

            <p class="nf-sub">
                This page doesn't exist, got moved, or was never real to begin with.<br>
                The good stuff is back on the shelf.
            </p>

            <div class="nf-actions">
                <a href="index.html" class="nf-btn-primary">
                    <i class="fa-solid fa-arrow-left"></i> Back to Finds
                </a>
                <a href="contact.html" class="nf-btn-secondary">
                    Report a broken link
                </a>
            </div>

            <div class="nf-glitch" aria-hidden="true">404</div>

        </main>
    </div>

    <script src="common-script.js"></script>
</body>
</html>
